<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultraviolet | Sophisticated Web Proxy</title>
    <style>
        body {
            background-color: #1a1c23;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; }
        p { color: #888; margin-bottom: 40px; }
        
        /* 検索バー */
        .search-container {
            width: 100%;
            max-width: 600px;
            background: #2a2d36;
            border-radius: 30px;
            padding: 15px 25px;
            display: flex;
            margin-bottom: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        /* カードのレイアウト */
        .cards-wrapper {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 60px;
        }
        .card {
            background: #222530;
            border: 2px solid #3a3f50;
            border-radius: 20px;
            width: 150px;
            height: 190px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: #38ef7d;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(56, 239, 125, 0.2);
        }
        .card-icon {
            width: 70px;
            height: 70px;
            background: #ff0000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }
        .card-icon.manga { background: #4a90e2; }
        .card-title { font-weight: bold; font-size: 1rem; margin-bottom: 5px; text-align: center; }
        .card-desc { font-size: 0.75rem; color: #888; text-align: center; padding: 0 10px; }

        /* 復活させた使い方ガイドのエリア */
        .guide-section {
            width: 100%;
            max-width: 600px;
            border-top: 1px solid #333;
            padding-top: 40px;
            margin-top: 20px;
        }
        .guide-box {
            background: #222530;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .guide-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #38ef7d;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .guide-text {
            color: #ccc;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* 漫画ろうのポップアップ（モーダル） */
        #manga-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a2d36;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .close-btn { float: right; cursor: pointer; font-size: 1.5rem; color: #888; }
        .manga-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: #3e4251;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .manga-btn:hover { background: #4f5468; border-left: 4px solid #4a90e2; }
    </style>
</head>
<body>

    <h1>Ultraviolet | TN</h1>
    <p>好きなサイトを自由に検索してみましょう！</p>

    <!-- メイン検索 -->
    <form id="main-form" class="search-container">
        <input type="text" id="main-search" placeholder="キーワード、もしくはURLを入力...">
    </form>

    <!-- 下のアイコン群 -->
    <div class="cards-wrapper">
        <!-- 漫画ろうカード（押すとポップアップが開く） -->
        <div class="card" onclick="openMangaModal()">
            <div class="card-icon manga">📖</div>
            <div class="card-title">漫画ろう</div>
            <div class="card-desc">各種漫画サイトを選択して開く</div>
        </div>

        <!-- tokageTubeカード（押すと直接tube.htmlに飛ぶ） -->
        <a href="tube.html" class="card">
            <div class="card-icon">🦎</div>
            <div class="card-title">tokageTube</div>
            <div class="card-desc">超高速で動画を視聴する</div>
        </a>
    </div>

    <!-- 復活した使い方ガイドエリア -->
    <div class="guide-section">
        <div class="guide-box">
            <div class="guide-title">📋 ステップ1</div>
            <div class="guide-text">1. 調べたいものを検索する</div>
        </div>
        <div class="guide-box">
            <div class="guide-title">🚀 ステップ2</div>
            <div class="guide-text">上の検索バーやアイコンを使って、ブロックを回避して好きなページへアクセスできます。</div>
        </div>
    </div>

    <!-- 漫画ろうポップアップ -->
    <div id="manga-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeMangaModal()">&times;</span>
            <h2 style="margin-top:0; color:#4a90e2;">📖 漫画サイトを選択</h2>
            <button class="manga-btn" onclick="openProxy('https://klmanga.news')">klmanga.news を開く</button>
            <button class="manga-btn" onclick="openProxy('https://mangaraw.love')">mangaraw.love を開く</button>
            <button class="manga-btn" onclick="openProxy('https://dokiraw.in')">dokiraw.in を開く</button>
            <button class="manga-btn" onclick="openProxy('https://mangaraw24.net')">mangaraw24.net を開く</button>
        </div>
    </div>

    <!-- プロキシ必須ファイル -->
    <script src="baremux/index.js"></script>
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    
    <script>
        // サービスワーカー登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: __uv$config.prefix });
        }

        // ポップアップの操作
        function openMangaModal() { document.getElementById('manga-modal').style.display = 'flex'; }
        function closeMangaModal() { document.getElementById('manga-modal').style.display = 'none'; }

        // プロキシ経由でURLを開く関数
        function openProxy(url) {
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        }

        // メイン検索バーの処理
        document.getElementById('main-form').addEventListener('submit', async e => {
            e.preventDefault();
            const input = document.getElementById('main-search').value.trim();
            if (!input) return;
            let url = input;
            if (!/^https?:\/\//i.test(input) && !input.includes('.')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(input);
            } else if (!/^https?:\/\//i.test(input)) {
                url = 'https://' + input;
            }
            openProxy(url);
        });
    </script>
</body>
</html>
