<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokage Tube 🦎</title>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #cc0000;
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
      max-width: 600px;
      margin: 0 auto 20px;
    }
    .search-box {
      margin-bottom: 30px;
    }
    input[type="text"] {
      padding: 12px;
      width: 60%;
      max-width: 400px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      font-size: 16px;
    }
    button {
      padding: 12px 20px;
      background-color: #cc0000;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.2s;
    }
    button:hover {
      background-color: #ff0000;
    }
    #player-container {
      display: none;
      max-width: 800px;
      margin: 0 auto 30px;
    }
    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    #results {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .video-card {
      background: #1e1e1e;
      width: 280px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #333;
    }
    .video-card:hover {
      transform: translateY(-5px);
      border-color: #cc0000;
    }
    .video-card img {
      width: 100%;
      border-radius: 8px;
    }
    .video-card h3 {
      font-size: 14px;
      margin: 10px 0 5px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .author {
      font-size: 12px;
      color: #aaa;
      text-align: left;
    }
    #status-message {
      color: #ffaa00;
      font-size: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>Tokage Tube 🦎</h1>

  <div class="search-box">
    <input type="text" id="search-query" placeholder="動画を検索...">
    <button onclick="searchVideos()">検索</button>
  </div>

  <div id="status-message"></div>

  <div id="player-container">
    <iframe id="video-player" allowfullscreen></iframe>
  </div>

  <div id="results"></div>

  <script>
    let activeServer = '';

    async function searchVideos() {
      const query = document.getElementById('search-query').value;
      if (!query) return;
      
      const resultsDiv = document.getElementById('results');
      const statusDiv = document.getElementById('status-message');
      
      resultsDiv.innerHTML = '';
      statusDiv.innerHTML = '生きてるサーバーを探して検索中...👀';
      
      // 3つの強力なサーバーを順番に試すリスト
      const servers = [
        'https://inv.tux.pizza',
        'https://inv.nadeko.net',
        'https://invidious.nerdvpn.de'
      ];
      
      let data = null;
      
      // サーバーを1つずつアタックして、繋がったらストップする魔法のループ
      for (const server of servers) {
        try {
          const response = await fetch(server + '/api/v1/search?q=' + encodeURIComponent(query));
          if (response.ok) {
            data = await response.json();
            activeServer = server; // 成功したサーバーを記憶
            break; 
          }
        } catch (error) {
          console.log(server + ' はブロックされました。次を試します...');
        }
      }
      
      // 全部ダメだった場合
      if (!data) {
        statusDiv.innerHTML = '【エラー】現在すべての裏サーバーがブロックされているか混雑しています😭 時間をおいて試してください。';
        return;
      }

      statusDiv.innerHTML = ''; // 成功したらメッセージを消す
      
      if (data.length === 0) {
          statusDiv.innerHTML = '動画が見つかりませんでした。';
          return;
      }

      // 結果を表示
      data.forEach(video => {
        if (video.type !== 'video') return;
        
        const card = document.createElement('div');
        card.className = 'video-card';
        card.onclick = () => playVideo(video.videoId);
        
        card.innerHTML = `
          <img src="${activeServer}/vi/${video.videoId}/mqdefault.jpg" alt="thumbnail">
          <h3>${video.title}</h3>
          <p class="author">${video.author}</p>
        `;
        resultsDiv.appendChild(card);
      });
    }

    // 動画を再生
    function playVideo(videoId) {
      const playerContainer = document.getElementById('player-container');
      const videoPlayer = document.getElementById('video-player');
      
      // 検索に成功したサーバーを使って再生する
      videoPlayer.src = `${activeServer}/embed/${videoId}?autoplay=1`;
      playerContainer.style.display = 'block';
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>

</body>
</html>
